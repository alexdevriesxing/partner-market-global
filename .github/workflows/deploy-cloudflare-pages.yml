name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: 899b9544ac8588b5d6e092e081eb4e07
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: >
          npx wrangler pages deploy out
          --project-name=partner-market-global
          --branch=${{ github.ref_name }}
          --commit-hash=${{ github.sha }}
          --commit-dirty=false

      - name: Cloudflare token missing
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: |
          echo "::warning::Skipping deploy because CLOUDFLARE_API_TOKEN is not set in repository secrets."
