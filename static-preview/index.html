<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Partner Market Global — Static Mockup Preview</title>
  <style>
    :root{--blue:#115be7;--navy:#082352;--muted:#65728d;--border:#dfe8f5}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#f7faff;color:var(--navy)}
    .wrap{max-width:1600px;margin:0 auto;padding:28px 18px 60px}
    .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
    .top img{width:150px}.top a{background:var(--blue);color:#fff;padding:12px 16px;border-radius:9px;text-decoration:none;font-weight:800}
    h1{font-size:40px;margin:10px 0 8px;letter-spacing:-.04em}.lead{color:var(--muted);max-width:860px;line-height:1.6}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:25px}.panel{background:#fff;border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 16px 40px rgba(8,35,82,.08)}.panel img{display:block;width:100%;height:auto}
    .assets{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:30px}.asset{background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px}.asset img{width:100%;border-radius:12px}.asset strong{display:block;margin-top:10px}
    @media(max-width:1100px){.grid{grid-template-columns:1fr}.top{display:block}.top a{display:inline-flex;margin-top:14px}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <img src="../public/assets/partner-market-global-logo.svg" alt="Partner Market Global" />
      <a href="../README.md">Read project README</a>
    </div>
    <h1>Partner Market Global static mockup preview</h1>
    <p class="lead">This static file shows the extracted artboards and visual assets included in the full Next.js website code package.</p>
    <section class="grid">
      <article class="panel"><img src="../public/assets/homepage-panel.webp" alt="Homepage panel" /></article>
      <article class="panel"><img src="../public/assets/opportunity-detail-panel.webp" alt="Opportunity detail panel" /></article>
      <article class="panel"><img src="../public/assets/for-companies-panel.webp" alt="For companies panel" /></article>
    </section>
    <section class="assets">
      <article class="asset"><img src="../public/assets/logo-crop.webp" alt="Logo crop"><strong>Logo crop</strong></article>
      <article class="asset"><img src="../public/assets/hero-map-section.webp" alt="Hero map"><strong>Hero map</strong></article>
      <article class="asset"><img src="../public/assets/detail-hero-food.webp" alt="Detail hero"><strong>Detail hero</strong></article>
      <article class="asset"><img src="../public/assets/companies-hero-collage.webp" alt="Companies collage"><strong>Companies collage</strong></article>
      <article class="asset"><img src="../public/assets/packages-section.webp" alt="Packages"><strong>Packages</strong></article>
      <article class="asset"><img src="../public/assets/homepage-cta-banner.webp" alt="CTA"><strong>CTA banner</strong></article>
    </section>
  </main>
</body>
</html>
